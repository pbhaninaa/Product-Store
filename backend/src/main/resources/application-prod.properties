server.port=8080

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

app.auth.jwtSecret=${JWT_SECRET}
app.auth.jwtIssuer=${JWT_ISSUER:productstore}
app.auth.jwtAudience=${JWT_AUDIENCE:productstore-web}

# SendGrid for PROD
app.email.from=${EMAIL_FROM:no-reply@yourdomain.com}
sendgrid.apiKey=${SENDGRID_API_KEY}

# Public URL for file access from any machine
app.public-base-url=${PUBLIC_BASE_URL:https://yourdomain.com}
app.uploads.dir=${UPLOADS_DIR:./data/uploads}

