spring.application.name=platform
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=CHAR

# Default to SIT(Local)
spring.profiles.active=local

spring.servlet.multipart.max-file-size=12MB
spring.servlet.multipart.max-request-size=14MB

# Public URLs for saved assets (SPA often on another origin in dev).
app.public-base-url=http://localhost:8080
app.uploads.dir=./data/uploads

