# -----------------------------
# App
# -----------------------------
spring.application.name=platform
spring.profiles.active=local

# -----------------------------
# Server
# -----------------------------
server.port=8080

# -----------------------------
# Datasource (EDIT THESE)
# -----------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/platform_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -----------------------------
# JPA / Hibernate
# -----------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# UUID handling
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=CHAR

# -----------------------------
# File Upload Limits
# -----------------------------
spring.servlet.multipart.max-file-size=12MB
spring.servlet.multipart.max-request-size=14MB

# -----------------------------
# File Storage (Recommended)
# -----------------------------
app.public-base-url=http://localhost:8080
app.uploads.dir=./data/uploads

# -----------------------------
# Logging (optional but useful)
# -----------------------------
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE