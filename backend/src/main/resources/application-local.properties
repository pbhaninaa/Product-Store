server.port=8080

# MySQL (Local / SIT)
# DB name: Product-site
spring.datasource.url=jdbc:mysql://localhost:3306/Product-site?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
