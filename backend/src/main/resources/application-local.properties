spring.datasource.password=Philas@12

app.auth.jwtSecret=${JWT_SECRET:dev-only-change-me}
app.auth.jwtIssuer=${JWT_ISSUER:productstore}
app.auth.jwtAudience=${JWT_AUDIENCE:productstore-web}

# Local SMTP (use MailHog or similar)
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:1025}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

app.email.from=${EMAIL_FROM:no-reply@localhost}

